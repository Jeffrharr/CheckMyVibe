# CheckMyVibe Gate — arms the `check-my-vibe-protection` status as `pending` on every PR push.
# Clear it by running `/check-my-vibe` in Claude Code; that flips the status to success.
name: CheckMyVibe Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  statuses: write

jobs:
  arm:
    runs-on: ubuntu-latest
    steps:
      - uses: Jeffrharr/CheckMyVibe@main
